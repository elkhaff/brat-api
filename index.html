<style>
  /* ── TOKENS ── */
  :root {
    --bg:       #ffffff;
    --surface:  #f5f5f5;
    --border:   #e0e0e0;
    --text:     #0a0a0a;
    --muted:    #888888;
    --invert-bg:   #0a0a0a;
    --invert-text: #ffffff;
    --font-narrow: 'Arial Narrow', 'Arial', sans-serif;
    --radius: 0px;
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }
  [data-theme="dark"] {
    --bg:      #0a0a0a;
    --surface: #161616;
    --border:  #2a2a2a;
    --text:    #f2f2f2;
    --muted:   #666666;
    --invert-bg:   #f2f2f2;
    --invert-text: #0a0a0a;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
    font-size: 15px;
    line-height: 1.5;
    min-height: 100dvh;
    transition: background 0.15s, color 0.15s;
    -webkit-font-smoothing: antialiased;
  }

  /* ── HEADER ── */
  header {
    position: sticky;
    top: 0;
    z-index: 10;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    padding: 0 20px;
    height: 56px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    transition: background 0.15s, border-color 0.15s;
  }

  .header-left {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .header-favicon {
    display: flex;
    align-items: center;
    opacity: 0.85;
    transition: opacity 0.15s;
    flex-shrink: 0;
  }
  .header-favicon:hover { opacity: 1; }
  .header-favicon img { display: block; border-radius: 4px; }

  .wordmark {
    font-family: var(--font-narrow);
    font-size: 28px;
    font-weight: 500;
    letter-spacing: -0.01em;
    filter: blur(1.5px);
    line-height: 1;
    color: var(--text);
    text-decoration: none;
    display: inline-block;
    transition: color 0.15s;
  }

  .header-sub {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.04em;
    display: none;
  }
  @media (min-width: 480px) { .header-sub { display: inline; } }

  /* theme cycle button */
  .btn-theme {
    width: 36px;
    height: 36px;
    border: 1px solid var(--border);
    background: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text);
    flex-shrink: 0;
    transition: border-color 0.15s, background 0.15s;
    border-radius: 50%;
  }
  .btn-theme:hover { background: var(--surface); }
  .btn-theme svg { width: 16px; height: 16px; }

  /* ── HERO ── */
  .hero {
    text-align: center;
    padding: 32px 20px 24px;
    border-bottom: 1px solid var(--border);
  }
  .hero-title {
    font-family: var(--font-narrow);
    font-size: clamp(52px, 14vw, 88px);
    font-weight: 500;
    filter: blur(2px);
    display: inline-block;
    line-height: 1;
    margin-bottom: 10px;
    letter-spacing: -0.02em;
  }
  .hero-desc {
    color: var(--muted);
    font-size: 13px;
    max-width: 36ch;
    margin: 0 auto;
  }

  /* ── MAIN LAYOUT ── */
  main {
    max-width: 960px;
    margin: 0 auto;
    padding: 28px 20px calc(40px + var(--safe-bottom));
  }

  /* desktop: 2-col */
  @media (min-width: 720px) {
    .layout {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 32px;
      align-items: start;
    }
  }

  /* ── SECTION TITLES ── */
  .section-label {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 16px;
  }

  /* ── TABS ── */
  .tabs {
    display: grid;
    grid-template-columns: 1fr 1fr;
    border: 1px solid var(--border);
    margin-bottom: 20px;
    transition: border-color 0.15s;
  }
  .tab {
    background: none;
    border: none;
    padding: 11px 8px;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.07em;
    text-transform: uppercase;
    cursor: pointer;
    color: var(--muted);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 7px;
    transition: background 0.1s, color 0.1s;
  }
  .tab svg { width: 15px; height: 15px; flex-shrink: 0; }
  .tab.active { background: var(--invert-bg); color: var(--invert-text); }
  .tab:not(.active):hover { background: var(--surface); color: var(--text); }
  .tab:first-child { border-right: 1px solid var(--border); }

  /* ── FIELD ── */
  .field { margin-bottom: 16px; }
  label {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.07em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 7px;
  }
  label svg { width: 12px; height: 12px; }

  input[type="text"],
  input[type="number"] {
    width: 100%;
    border: 1px solid var(--border);
    background: var(--bg);
    padding: 11px 12px;
    font-size: 15px;
    font-family: inherit;
    color: var(--text);
    outline: none;
    -webkit-appearance: none;
    transition: border-color 0.15s, background 0.15s, color 0.15s;
  }
  input[type="text"]::placeholder { color: var(--muted); opacity: 0.5; }
  input[type="text"]:focus,
  input[type="number"]:focus {
    border-color: var(--text);
    outline: none;
  }
  input[type="number"] { -moz-appearance: textfield; }
  input[type="number"]::-webkit-inner-spin-button,
  input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; }

  /* ── 2-COL GRID ── */
  .row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px; }
  .row-2 .field { margin-bottom: 0; }

  /* ── COLOR INPUT ── */
  .color-row {
    display: grid;
    grid-template-columns: 40px 1fr;
    border: 1px solid var(--border);
    transition: border-color 0.15s;
    overflow: hidden;
  }
  .color-row:focus-within { border-color: var(--text); }
  .color-row input[type="color"] {
    width: 40px;
    height: 40px;
    padding: 4px;
    border: none;
    border-right: 1px solid var(--border);
    background: none;
    cursor: pointer;
    transition: border-color 0.15s;
  }
  .color-row input[type="text"] {
    border: none;
    padding: 9px 10px;
    font-size: 13px;
    font-family: 'SF Mono', 'Cascadia Code', Consolas, monospace;
  }
  .color-row input[type="text"]:focus { border-color: transparent; }

  /* ── VID FIELDS ── */
  .vid-fields { display: none; }
  .vid-fields.visible { display: block; }

  /* ── GENERATE BTN ── */
  .btn-generate {
    width: 100%;
    background: var(--invert-bg);
    color: var(--invert-text);
    border: none;
    padding: 13px 16px;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.07em;
    text-transform: uppercase;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    transition: opacity 0.15s, background 0.15s, color 0.15s;
  }
  .btn-generate:active { opacity: 0.75; }
  .btn-generate:disabled { opacity: 0.35; cursor: not-allowed; }
  .btn-generate svg { width: 15px; height: 15px; }

  /* spinner inside btn */
  @keyframes spin { to { transform: rotate(360deg); } }
  .spin { animation: spin 0.7s linear infinite; }

  /* ── PREVIEW PANEL ── */
  .preview-panel { position: relative; }

  .preview-box {
    border: 1px solid var(--border);
    aspect-ratio: 1;
    background: var(--surface);
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
    transition: border-color 0.15s, background 0.15s;
  }

  .preview-box img,
  .preview-box video {
    width: 100%;
    height: 100%;
    object-fit: contain;
    display: block;
    /* video: matiin pointer events biar player chrome-nya gak bisa di-klik */
    pointer-events: none;
    user-select: none;
  }

  /* ── PRESETS ── */
  .presets-label {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.07em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .presets-label svg { width: 12px; height: 12px; }
  .preset-chips {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 16px;
  }
  .preset-chip {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 5px 10px;
    border: 1px solid var(--border);
    background: none;
    cursor: pointer;
    font-size: 11px;
    font-weight: 600;
    color: var(--text);
    letter-spacing: 0.03em;
    transition: border-color 0.1s, background 0.1s;
    white-space: nowrap;
  }
  .preset-chip:hover { border-color: var(--text); }
  .preset-chip.active { border-color: var(--text); background: var(--surface); }
  .preset-swatch {
    width: 12px;
    height: 12px;
    border-radius: 50%;
    border: 1px solid rgba(0,0,0,0.15);
    flex-shrink: 0;
  }

  .preview-placeholder {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    color: var(--muted);
    font-size: 13px;
    text-align: center;
    padding: 20px;
    user-select: none;
  }
  .preview-placeholder svg { width: 40px; height: 40px; opacity: 0.25; }

  /* loading overlay */
  .preview-overlay {
    position: absolute;
    inset: 0;
    background: color-mix(in srgb, var(--bg) 85%, transparent);
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    font-size: 13px;
    color: var(--muted);
    backdrop-filter: blur(2px);
  }
  .preview-overlay.visible { display: flex; }
  .preview-overlay svg { width: 24px; height: 24px; }

  /* ── ACTIONS ── */
  .actions {
    display: none;
    gap: 8px;
    margin-top: 10px;
  }
  .actions.visible { display: grid; grid-template-columns: 1fr 1fr 1fr; }

  .btn-action {
    background: none;
    border: 1px solid var(--border);
    padding: 10px 6px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    cursor: pointer;
    color: var(--text);
    text-decoration: none;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    transition: background 0.1s, color 0.1s, border-color 0.15s;
    white-space: nowrap;
  }
  .btn-action svg { width: 14px; height: 14px; flex-shrink: 0; }
  .btn-action:hover { background: var(--invert-bg); color: var(--invert-text); border-color: var(--invert-bg); }
  .btn-action:active { opacity: 0.7; }

  /* ── ERROR ── */
  .error-msg {
    display: none;
    margin-top: 10px;
    padding: 10px 12px;
    border: 1px solid var(--border);
    font-size: 13px;
    color: var(--text);
    background: var(--surface);
    display: none;
    align-items: flex-start;
    gap: 8px;
    transition: border-color 0.15s, background 0.15s;
  }
  .error-msg.visible { display: flex; }
  .error-msg svg { width: 15px; height: 15px; flex-shrink: 0; margin-top: 1px; }

  /* ── FOOTER ── */
  footer {
    border-top: 1px solid var(--border);
    padding: 20px 24px;
    font-size: 12px;
    color: var(--muted);
    transition: border-color 0.15s;
  }
  .footer-inner {
    max-width: 960px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    flex-wrap: wrap;
  }
  .footer-copy {
    display: flex;
    flex-direction: column;
    gap: 3px;
  }
  .footer-author {
    font-weight: 600;
    color: var(--text);
    font-size: 13px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .footer-author a {
    color: inherit;
    text-decoration: none;
  }
  .footer-author a:hover { text-decoration: underline; text-underline-offset: 3px; }
  .footer-year { font-size: 11px; color: var(--muted); }
  .footer-links {
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
  }
  .footer-links a {
    color: var(--muted);
    text-decoration: none;
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 12px;
    transition: color 0.1s;
  }
  .footer-links a:hover { color: var(--text); }
  .footer-links svg { width: 13px; height: 13px; flex-shrink: 0; }
  .footer-dot { color: var(--border); }

  /* ── DESKTOP ADJUSTMENTS ── */
  @media (min-width: 720px) {
    .hero { padding: 40px 20px 28px; }
    .preview-panel { position: sticky; top: 76px; }
    main { padding-top: 36px; }
  }

  /* ── REDUCED MOTION ── */
  @media (prefers-reduced-motion: reduce) {
    .spin { animation: none; }
    body, header, input, .btn-action, .btn-theme { transition: none; }
  }
</style>
</head>
<body>

<!-- ════════════════ HEADER ════════════════ -->
<header>
  <div class="header-left">
    <a href="https://l.elkaff.is-a.dev" target="_blank" rel="noopener" class="header-favicon" aria-label="elkaff">
      <img src="https://elkaff.is-a.dev/favicon.svg" alt="elkaff" width="22" height="22">
    </a>
    <span class="wordmark">brat</span>
    <span class="header-sub">generator</span>
  </div>
  <button class="btn-theme" id="btn-theme" onclick="cycleTheme()" aria-label="Toggle theme">
    <!-- icon swapped by JS -->
    <svg id="theme-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/>
    </svg>
  </button>
</header>

<!-- ════════════════ HERO ════════════════ -->
<div class="hero">
  <div class="hero-title">brat</div>
  <p class="hero-desc">generate brat-style images &amp; videos from any text</p>
</div>

<!-- ════════════════ MAIN ════════════════ -->
<main>
  <div class="layout">

    <!-- LEFT: CONTROLS -->
    <div class="controls-panel">

      <!-- TABS -->
      <div class="tabs" role="tablist">
        <button class="tab active" id="tab-img" role="tab" aria-selected="true" onclick="setMode('img')">
          <!-- image icon -->
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21,15 16,10 5,21"/>
          </svg>
          Image
        </button>
        <button class="tab" id="tab-vid" role="tab" aria-selected="false" onclick="setMode('vid')">
          <!-- video icon -->
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polygon points="23,7 16,12 23,17 23,7"/><rect x="1" y="5" width="15" height="14" rx="2"/>
          </svg>
          Video
        </button>
      </div>

      <!-- TEXT -->
      <div class="field">
        <label for="inp-text">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="4,7 4,4 20,4 20,7"/><line x1="9" y1="20" x2="15" y2="20"/><line x1="12" y1="4" x2="12" y2="20"/></svg>
          Text
        </label>
        <input type="text" id="inp-text" placeholder="brat summer" maxlength="500" autocomplete="off" spellcheck="false">
      </div>

      <!-- COLORS -->
      <div class="row-2">
        <div class="field">
          <label>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/></svg>
            Background
          </label>
          <div class="color-row">
            <input type="color" id="cp-bg" value="#ffffff" aria-label="Background color picker">
            <input type="text"  id="ct-bg" value="#ffffff" maxlength="7" spellcheck="false" aria-label="Background hex value">
          </div>
        </div>
        <div class="field">
          <label>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="4" fill="currentColor" stroke="none"/></svg>
            Text color
          </label>
          <div class="color-row">
            <input type="color" id="cp-fg" value="#000000" aria-label="Text color picker">
            <input type="text"  id="ct-fg" value="#000000" maxlength="7" spellcheck="false" aria-label="Text color hex value">
          </div>
        </div>
      </div>

      <!-- COLOR PRESETS -->
      <div>
        <div class="presets-label">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 2a10 10 0 0 1 0 20"/><path d="M8 12a4 4 0 0 1 8 0"/></svg>
          Presets
        </div>
        <div class="preset-chips" id="preset-chips"></div>
      </div>

      <!-- VID PARAMS -->
      <div class="vid-fields" id="vid-fields">
        <div class="row-2">
          <div class="field">
            <label for="inp-speed">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12,6 12,12 16,14"/></svg>
              Speed (ms/word)
            </label>
            <input type="number" id="inp-speed" value="500" min="200" max="2000" step="50">
          </div>
          <div class="field">
            <label for="inp-hold">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
              Hold last (ms)
            </label>
            <input type="number" id="inp-hold" value="1200" min="0" max="5000" step="100">
          </div>
        </div>
      </div>

      <!-- GENERATE BTN (video only) -->
      <button class="btn-generate" id="btn-gen" style="display:none" onclick="generateVid()">
        <svg id="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polygon points="5,3 19,12 5,21 5,3" fill="currentColor" stroke="none"/>
        </svg>
        <span id="btn-label">Generate video</span>
      </button>

    </div><!-- /controls-panel -->

    <!-- RIGHT: PREVIEW -->
    <div class="preview-panel">

      <div class="preview-box" id="preview-box">
        <div class="preview-placeholder" id="preview-placeholder">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21,15 16,10 5,21"/>
          </svg>
          <span id="placeholder-text">type something to preview</span>
        </div>
        <!-- loading overlay -->
        <div class="preview-overlay" id="preview-overlay">
          <svg class="spin" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <path d="M12 2a10 10 0 1 0 10 10" opacity="0.3"/><path d="M22 12A10 10 0 0 0 12 2"/>
          </svg>
          <span id="overlay-msg">Loading…</span>
        </div>
      </div>

      <!-- ERROR -->
      <div class="error-msg" id="error-msg">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
        <span id="error-text"></span>
      </div>

      <!-- ACTIONS -->
      <div class="actions" id="actions">
        <a class="btn-action" id="btn-open" href="#" target="_blank" rel="noopener" aria-label="Open in new tab">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15,3 21,3 21,9"/><line x1="10" y1="14" x2="21" y2="3"/>
          </svg>
          Open
        </a>
        <a class="btn-action" id="btn-dl" href="#" download aria-label="Download">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7,10 12,15 17,10"/><line x1="12" y1="15" x2="12" y2="3"/>
          </svg>
          Download
        </a>
        <button class="btn-action" id="btn-copy" onclick="copyUrl()" aria-label="Copy URL">
          <svg id="copy-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
          </svg>
          Copy URL
        </button>
      </div>

    </div><!-- /preview-panel -->

  </div><!-- /layout -->
</main>

<script>
const API = 'https://elkaf-brat.hf.space';
let mode = 'img';
let currentUrl = null;
let debounceTimer = null;

const $ = id => document.getElementById(id);

/* ── THEME ── */
const THEMES = ['system', 'light', 'dark'];
const ICONS = {
  system: `<circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/>`,
  light:  `<circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>`,
  dark:   `<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>`
};

let themeIdx = THEMES.indexOf(localStorage.getItem('theme') || 'system');

function applyTheme() {
  const t = THEMES[themeIdx];
  const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
  const isDark = t === 'dark' || (t === 'system' && prefersDark);
  document.documentElement.setAttribute('data-theme', isDark ? 'dark' : 'light');
  $('meta-theme').content = isDark ? '#0a0a0a' : '#ffffff';
  $('theme-icon').innerHTML = ICONS[t];
  $('btn-theme').setAttribute('aria-label', `Theme: ${t}`);
}

function cycleTheme() {
  themeIdx = (themeIdx + 1) % THEMES.length;
  localStorage.setItem('theme', THEMES[themeIdx]);
  applyTheme();
}

window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', applyTheme);
applyTheme();

/* ── URL BUILDER ── */
function buildUrl() {
  const text = $('inp-text').value.trim() || 'brat';
  const bg   = $('ct-bg').value.trim() || '#ffffff';
  const fg   = $('ct-fg').value.trim() || '#000000';
  const enc  = s => encodeURIComponent(s);
  if (mode === 'img') {
    return `${API}/img?text=${enc(text)}&background=${enc(bg)}&color=${enc(fg)}`;
  }
  const speed = $('inp-speed').value || 500;
  const hold  = $('inp-hold').value  || 1200;
  return `${API}/vid?text=${enc(text)}&background=${enc(bg)}&color=${enc(fg)}&speed=${speed}&hold=${hold}`;
}

function slugify(s) {
  return s.trim().toLowerCase().replace(/\s+/g, '-').replace(/[^a-z0-9-]/g, '').slice(0, 40) || 'brat';
}

function makeFilename(ext) {
  const now = new Date();
  const pad = n => String(n).padStart(2, '0');
  const date = `${now.getFullYear()}${pad(now.getMonth()+1)}${pad(now.getDate())}-${pad(now.getHours())}${pad(now.getMinutes())}${pad(now.getSeconds())}`;
  const type = ext === 'png' ? 'img' : 'vid';
  return `brat.zone.id-${date}-${type}.${ext}`;
}

/* ── COLOR PRESETS ── */
const PRESETS = [
  { name: 'brat',      bg: '#8ace00', fg: '#000000' },
  { name: 'classic',   bg: '#ffffff', fg: '#000000' },
  { name: 'dark',      bg: '#000000', fg: '#ffffff' },
  { name: 'pink',      bg: '#ff69b4', fg: '#000000' },
  { name: 'lime',      bg: '#ccff00', fg: '#000000' },
  { name: 'fire',      bg: '#ff2200', fg: '#ffffff' },
  { name: 'midnight',  bg: '#0a0a1a', fg: '#8ace00' },
  { name: 'lavender',  bg: '#e6ccff', fg: '#2d0060' },
  { name: 'cream',     bg: '#f5f0e8', fg: '#1a1a1a' },
  { name: 'blue',      bg: '#0000ff', fg: '#ffff00' },
];

function renderPresets() {
  const container = $('preset-chips');
  container.innerHTML = '';
  PRESETS.forEach((p, i) => {
    const btn = document.createElement('button');
    btn.className = 'preset-chip';
    btn.dataset.idx = i;
    btn.innerHTML = `<span class="preset-swatch" style="background:${p.bg};border-color:${p.fg}22"></span>${p.name}`;
    btn.onclick = () => applyPreset(i);
    container.appendChild(btn);
  });
}

function applyPreset(idx) {
  const p = PRESETS[idx];
  $('cp-bg').value = p.bg; $('ct-bg').value = p.bg;
  $('cp-fg').value = p.fg; $('ct-fg').value = p.fg;
  document.querySelectorAll('.preset-chip').forEach((el, i) => {
    el.classList.toggle('active', i === idx);
  });
  if (mode === 'img') triggerImg();
}

renderPresets();

/* ── HELPERS ── */
function showOverlay(on, msg = 'Loading…') {
  $('overlay-msg').textContent = msg;
  $('preview-overlay').classList.toggle('visible', on);
}

function showError(msg) {
  $('error-text').textContent = msg;
  $('error-msg').classList.add('visible');
}
function clearError() { $('error-msg').classList.remove('visible'); }

function clearPreview() {
  $('preview-box').querySelectorAll('img, video').forEach(el => el.remove());
  $('preview-placeholder').style.display = '';
  $('actions').classList.remove('visible');
  currentUrl = null;
  clearError();
}

function setActions(apiUrl, dlUrl, ext) {
  currentUrl = apiUrl;
  $('btn-open').href    = apiUrl;
  $('btn-dl').href      = dlUrl || apiUrl;
  $('btn-dl').download  = makeFilename(ext);
  $('actions').classList.add('visible');
}

function scrollToPreview() {
  // Pada mobile (single-col) scroll ke actions biar tombol download langsung keliatan.
  // Desktop (2-col, preview sticky) gak perlu scroll jadi check dulu.
  const isDesktop = window.matchMedia('(min-width: 720px)').matches;
  if (isDesktop) return;
  $('actions').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

/* ── MODE ── */
function setMode(m) {
  mode = m;
  ['img','vid'].forEach(v => {
    $(`tab-${v}`).classList.toggle('active', v === m);
    $(`tab-${v}`).setAttribute('aria-selected', v === m);
  });
  $('vid-fields').classList.toggle('visible', m === 'vid');
  $('btn-gen').style.display = m === 'vid' ? 'flex' : 'none';
  $('preview-placeholder').querySelector('svg').innerHTML = m === 'img'
    ? `<rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21,15 16,10 5,21"/>`
    : `<polygon points="23,7 16,12 23,17 23,7"/><rect x="1" y="5" width="15" height="14" rx="2"/>`;
  $('placeholder-text').textContent = m === 'img' ? 'type something to preview' : 'set options and generate';
  clearPreview();
  if (m === 'img') triggerImg();
}

/* ── IMG: live debounced preview ── */
function triggerImg() {
  clearTimeout(debounceTimer);
  if (mode !== 'img') return;
  debounceTimer = setTimeout(async () => {
    clearPreview();
    const url = buildUrl();
    showOverlay(true, 'Loading image…');
    $('preview-placeholder').style.display = 'none';

    try {
      const resp = await fetch(url);
      if (!resp.ok) throw new Error(`API returned ${resp.status}`);
      const blob = await resp.blob();
      const objUrl = URL.createObjectURL(blob);

      const img = document.createElement('img');
      img.alt = 'brat preview';
      img.onload = () => {
        showOverlay(false);
        $('preview-box').appendChild(img);
        setActions(url, objUrl, 'png');
        scrollToPreview();
      };
      img.onerror = () => {
        $('preview-placeholder').style.display = '';
        showOverlay(false);
        showError('Failed to load image.');
      };
      img.src = objUrl;
    } catch (err) {
      $('preview-placeholder').style.display = '';
      showOverlay(false);
      showError('Failed to load — API might be waking up (cold start ~30s). Try again shortly.');
    }
  }, 600);
}

/* ── VID: manual generate ── */
async function generateVid() {
  clearPreview();
  clearError();
  const url = buildUrl();

  $('btn-gen').disabled = true;
  $('btn-icon').innerHTML = `<path d="M12 2a10 10 0 1 0 10 10" opacity="0.3"/><path d="M22 12A10 10 0 0 0 12 2"/>`;
  $('btn-icon').classList.add('spin');
  $('btn-label').textContent = 'Generating…';
  showOverlay(true, 'Rendering video…');
  $('preview-placeholder').style.display = 'none';

  try {
    const resp = await fetch(url);
    if (!resp.ok) throw new Error(`API returned ${resp.status}`);
    const blob = await resp.blob();
    const objUrl = URL.createObjectURL(blob);

    const vid = document.createElement('video');
    // SENGAJA gak set controls, autoplay, loop biar video keliatan kayak
    // gambar tertanam — native player chrome gak muncul, dan CSS
    // pointer-events:none bikin area preview gak bisa di-klik sama sekali.
    vid.playsInline = true;
    vid.muted = true;
    vid.src = objUrl;
    vid.onloadeddata = () => {
      showOverlay(false);
      $('preview-box').appendChild(vid);
      setActions(url, objUrl, 'mp4');
      scrollToPreview();
    };
  } catch (err) {
    $('preview-placeholder').style.display = '';
    showOverlay(false);
    showError(`Failed to generate video: ${err.message}`);
  } finally {
    $('btn-gen').disabled = false;
    $('btn-icon').classList.remove('spin');
    $('btn-icon').innerHTML = `<polygon points="5,3 19,12 5,21 5,3" fill="currentColor" stroke="none"/>`;
    $('btn-label').textContent = 'Generate video';
  }
}

/* ── COPY URL ── */
function copyUrl() {
  const url = buildUrl();
  navigator.clipboard.writeText(url).then(() => {
    $('copy-icon').innerHTML = `<polyline points="20,6 9,17 4,12"/>`;
    $('btn-copy').querySelector('span, :last-child') // fallback
    const span = [...$('btn-copy').childNodes].find(n => n.nodeType === 3 || n.tagName === 'SPAN');
    const origText = $('btn-copy').lastChild.textContent;
    $('btn-copy').lastChild.textContent = 'Copied!';
    setTimeout(() => {
      $('copy-icon').innerHTML = `<rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>`;
      $('btn-copy').lastChild.textContent = origText;
    }, 1600);
  });
}

/* ── COLOR SYNC ── */
function wireColor(cpId, ctId) {
  $(cpId).addEventListener('input', e => {
    $(ctId).value = e.target.value;
    if (mode === 'img') triggerImg();
  });
  $(ctId).addEventListener('input', e => {
    if (/^#[0-9a-fA-F]{6}$/.test(e.target.value)) {
      $(cpId).value = e.target.value;
      if (mode === 'img') triggerImg();
    }
  });
}
wireColor('cp-bg', 'ct-bg');
wireColor('cp-fg', 'ct-fg');

/* ── TEXT INPUT ── */
$('inp-text').addEventListener('input', () => { if (mode === 'img') triggerImg(); });
$('inp-text').addEventListener('keydown', e => { if (e.key === 'Enter' && mode === 'vid') generateVid(); });

/* ── INIT ── */
$('inp-text').focus();
const yr = new Date().getFullYear();
$('footer-year').textContent = `© 2026${yr > 2026 ? '–' + yr : ''}  brat generator`;
</script>

</body>
